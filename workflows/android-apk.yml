name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]
    paths:
      - "android_app/**"
      - ".github/workflows/android-apk.yml"
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - "android_app/**"
      - ".github/workflows/android-apk.yml"

jobs:
  build-debug-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake \
            libffi-dev libssl-dev build-essential ccache

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install cython==0.29.36 buildozer==1.5.0

      - name: Build debug APK with Buildozer
        working-directory: android_app
        env:
          BUILDOZER_WARN_ON_ROOT: "0"
        run: |
          buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: financeagent-debug-apk
          path: android_app/bin/*.apk
          if-no-files-found: error
          retention-days: 14
